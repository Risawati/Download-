<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Tautan Pendek</title>
    <style>
        /* Desain sederhana agar mirip dengan gambar kamu */
        body { font-family: sans-serif; background-color: #e0ebf8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { margin-top: 0; color: #333; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #4a90e2; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #357abd; }
        .result { margin-top: 20px; padding: 10px; background: #f0f9ff; border-left: 4px solid #4a90e2; word-break: break-all; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Generator Tautan Pendek</h2>
    
    <div class="form-group">
        <input type="url" id="longUrl" placeholder="https://example.com" required>
    </div>
    
    <div class="form-group">
        <input type="text" id="customSlug" placeholder="siput opsional (contoh: link-keren)">
    </div>
    
    <button id="generateBtn">Buat tautan pendek</button>

    <!-- Tempat menampilkan hasil -->
    <div id="resultBox" class="result">
        <strong>Tautan Pendek Kamu:</strong><br>
        <a id="shortenedLink" href="#" target="_blank"></a>
    </div>
</div>

<script>
document.getElementById('generateBtn').addEventListener('click', function() {
    const longUrl = document.getElementById('longUrl').value.trim();
    let customSlug = document.getElementById('customSlug').value.trim();
    const resultBox = document.getElementById('resultBox');
    const shortenedLink = document.getElementById('shortenedLink');

    // Validasi input URL utama
    if (!longUrl) {
        alert("Silakan masukkan URL tujuan terlebih dahulu!");
        return;
    }

    // Jika user tidak mengisi slug, buat teks acak sepanjang 6 karakter
    if (!customSlug) {
        customSlug = Math.random().toString(36).substring(2, 8);
    } else {
        // Membersihkan slug dari spasi atau karakter aneh agar aman untuk URL
        customSlug = customSlug.replace(/[^a-zA-Z0-9-_]/g, '-');
    }

    // Mengambil basis URL aplikasi saat ini (misal: http://127.0.0.1:5500/)
    const baseUrl = window.location.origin + window.location.pathname;
    const finalShortUrl = `${baseUrl}?to=${customSlug}`;

    // Simpan relasi antara slug kustom dan URL asli ke LocalStorage
    // Di dunia nyata/produksi, data ini harusnya dikirim dan disimpan ke Database (MySQL/MongoDB)
    localStorage.setItem(customSlug, longUrl);

    // Tampilkan hasilnya di layar
    shortenedLink.href = finalShortUrl;
    shortenedLink.innerText = finalShortUrl;
    resultBox.style.display = 'block';
});

// LOGIKA PENGALIHAN (REDIRECTOR)
// Fungsi ini otomatis berjalan saat seseorang membuka link hasil generate tersebut
window.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const slugKey = urlParams.get('to');

    if (slugKey) {
        // Cari URL asli berdasarkan slug yang ada di LocalStorage
        const targetUrl = localStorage.getItem(slugKey);

        if (targetUrl) {
            // Jika ditemukan, langsung alihkan halaman ke URL tujuan asli
            window.location.href = targetUrl;
        } else {
            alert("Maaf, tautan pendek tidak ditemukan atau sudah kedaluwarsa.");
        }
    }
});
</script>

</body>
</html>
