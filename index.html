<script>
    const btnDownload = document.getElementById('btnDownload');
    const btnBatal = document.getElementById('btnBatal');
    const fileNameElement = document.getElementById('fileName');

    // 1. FUNGSI TOMBOL DOWNLOAD (Mengunduh PDF Asli di Cloudflare)
    btnDownload.addEventListener('click', () => {
        // Tulis nama file PDF asli Anda di sini (harus sama persis dengan yang ada di Cloudflare)
        const namaFilePdfAsli = "dokumen_pajak.pdf"; 

        // Membuat elemen link tersembunyi
        const link = document.createElement('a');
        
        // Karena satu folder di Cloudflare, langsung panggil nama filenya
        link.href = namaFilePdfAsli; 
        
        // Memaksa browser untuk mendownload, bukan membuka di tab baru
        link.download = namaFilePdfAsli; 
        
        // Jalankan proses download
        document.body.appendChild(link);
        link.click();
        
        // Hapus link dari memori
        document.body.removeChild(link);
    });

    // 2. FUNGSI TOMBOL BATAL (Otomatis Keluar/Pindah Halaman)
    btnBatal.addEventListener('click', () => {
        window.location.href = "https://www.google.com"; // Mengarahkan keluar halaman
    });
</script>
