<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Dialog Modal</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #5a5a5a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .modal-card {
            background-color: #f7f9fc;
            width: 100%;
            max-width: 360px;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .modal-title {
            font-size: 20px;
            color: #1f1f1f;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .modal-subtitle {
            font-size: 14px;
            color: #626262;
            margin-bottom: 24px;
        }

        .info-row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .icon {
            width: 24px;
            height: 24px;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1f1f1f;
        }

        .input-line {
            flex: 1;
            font-size: 15px;
            color: #1f1f1f;
            padding-bottom: 8px;
            border-bottom: 1px solid #74777f;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            margin-top: 24px;
            margin-bottom: 24px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-row input {
            display: none;
        }

        .custom-checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid #44474e;
            border-radius: 2px;
            margin-right: 16px;
            display: inline-block;
            position: relative;
        }

        .checkbox-row input:checked + .custom-checkbox {
            background-color: #0b57d0;
            border-color: #0b57d0;
        }

        .checkbox-row input:checked + .custom-checkbox::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 1px;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .checkbox-label {
            font-size: 14px;
            color: #44474e;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
        }

        .btn-batal {
            background: none;
            border: none;
            color: #0b57d0;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 16px;
            cursor: pointer;
            border-radius: 20px;
        }

        .btn-batal:hover {
            background-color: rgba(11, 87, 208, 0.08);
        }

        .btn-download {
            background-color: #0b57d0;
            color: white;
            border: none;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 24px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .btn-download:hover {
            background-color: #0842a0;
        }
    </style>
</head>
<body>

    <div class="modal-card" id="downloadModal">
        <h2 class="modal-title">Download file lagi?</h2>
        <p class="modal-subtitle">Nama file sudah ada</p>

        <!-- Baris Nama File -->
        <div class="info-row">
            <div class="icon">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            </div>
            <!-- ID ditambahkan di sini untuk mengambil nama file via JS -->
            <div class="input-line" id="fileName">PIT_M_03-DOC010_Personal_Income_Tax_R.txt</div>
        </div>

        <!-- Baris Folder Tujuan -->
        <div class="info-row">
            <div class="icon">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
            </div>
            <div class="input-line">Download</div>
        </div>

        <!-- Checkbox -->
        <label class="checkbox-row">
            <input type="checkbox" id="dont-show">
            <span class="custom-checkbox"></span>
            <span class="checkbox-label">Jangan tampilkan lagi</span>
        </label>

        <!-- Tombol Aksi -->
        <div class="actions">
            <button class="btn-batal" id="btnBatal">Batal</button>
            <button class="btn-download" id="btnDownload">Download</button>
        </div>
    </div>

    <!-- JAVASCRIPT UNTUK AKSI DOWNLOAD -->
    <script>
        const btnDownload = document.getElementById('btnDownload');
        const btnBatal = document.getElementById('btnBatal');
        const modal = document.getElementById('downloadModal');
        const fileNameElement = document.getElementById('fileName');

        // Fungsi saat tombol Download dipencet
        btnDownload.addEventListener('click', () => {
            const fileName = fileNameElement.innerText;
            
            // 1. Membuat file bohongan/simulasi berisi teks di memori browser
            const fileContent = "Ini adalah isi file simulasi tax return Anda.";
            const blob = new Blob([fileContent], { type: "text/plain" });
            
            // 2. Membuat elemen link tersembunyi secara dinamis
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = fileName; // Mengatur nama file saat diunduh sesuai teks di modal
            
            // 3. Memicu klik otomatis pada link tersembunyi untuk memulai download
            document.body.appendChild(link);
            link.click();
            
            // 4. Bersihkan link dari memori browser
            document.body.removeChild(link);
            
            // Opsional: Sembunyikan modal setelah download selesai
            alert('File mulai diunduh!');
            modal.style.display = 'none';
        });

        // Fungsi saat tombol Batal dipencet
        btnBatal.addEventListener('click', () => {
            modal.style.display = 'none'; // Menyembunyikan modal
        });
    </script>

</body>
</html>
